name: Build Python Runtime Artifacts

"on":
  workflow_dispatch:
    inputs:
      publish_release:
        description: "Upload assets to versioned release tag 'python-runtime-<version>' in separate release repository"
        required: false
        default: false
        type: boolean
  push:
    branches:
      - master
    paths:
      - runs/bootstrap_venv.sh
      - runs/build_python_runtime_artifact.sh
      - runs/install_packages.sh
      - data/config/python_runtime_version.txt
      - .github/workflows/build_python_runtime_artifacts.yml

permissions:
  contents: write

jobs:
  build-runtime:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x86_64
            platform: linux/amd64
            debian_version: "11"
            image: debian:bullseye
          - arch: x86_64
            platform: linux/amd64
            debian_version: "12"
            image: debian:bookworm
          - arch: x86_64
            platform: linux/amd64
            debian_version: "13"
            image: debian:trixie
          # - arch: aarch64
          #   platform: linux/arm64
          #   debian_version: "11"
          #   image: debian:bullseye
          # - arch: aarch64
          #   platform: linux/arm64
          #   debian_version: "12"
          #   image: debian:bookworm
          # - arch: aarch64
          #   platform: linux/arm64
          #   debian_version: "13"
          #   image: debian:trixie
          # - arch: armv7l
          #   platform: linux/arm/v7
          #   debian_version: "11"
          #   image: debian:bullseye
          # - arch: armv7l
          #   platform: linux/arm/v7
          #   debian_version: "12"
          #   image: debian:bookworm
          # - arch: armv7l
          #   platform: linux/arm/v7
          #   debian_version: "13"
          #   image: debian:trixie
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Read Python runtime version
        id: pyver
        run: |
          version=$(head -n 1 data/config/python_runtime_version.txt | tr -d '[:space:]')
          echo "version=${version}" >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4
        with:
          platforms: arm64,arm

      - name: Build runtime artifact in Debian container
        run: |
          set -euo pipefail

          docker run --rm \
            --platform "${{ matrix.platform }}" \
            -v "${{ github.workspace }}:/workspace" \
            -w /workspace \
            -e PYTHON_VERSION="${{ steps.pyver.outputs.version }}" \
            -e TARGET_ARCH="${{ matrix.arch }}" \
            -e TARGET_OS_VARIANT="debian${{ matrix.debian_version }}" \
            -e EXPECTED_DEBIAN_MAJOR="${{ matrix.debian_version }}" \
            "${{ matrix.image }}" \
            bash -lc '
              set -euo pipefail

              apt-get update
              apt-get -y install \
                build-essential make libssl-dev zlib1g-dev libbz2-dev \
                libreadline-dev libsqlite3-dev libffi-dev liblzma-dev xz-utils \
                tk-dev libncursesw5-dev git curl

              actual_arch="$(uname -m)"
              case "${actual_arch}" in
                x86_64|amd64) normalized_arch="x86_64" ;;
                aarch64|arm64) normalized_arch="aarch64" ;;
                armv7l|armv7*) normalized_arch="armv7l" ;;
                *) normalized_arch="${actual_arch}" ;;
              esac

              if [[ "${normalized_arch}" != "${TARGET_ARCH}" ]]; then
                echo "Architektur-Mismatch: erwartet ${TARGET_ARCH}, erhalten ${normalized_arch}" >&2
                exit 1
              fi

              source /etc/os-release
              if [[ "${ID}" != "debian" ]]; then
                echo "OS-Mismatch: erwartet Debian, erhalten ${ID}" >&2
                exit 1
              fi

              actual_debian_major="${VERSION_ID%%.*}"
              if [[ "${actual_debian_major}" != "${EXPECTED_DEBIAN_MAJOR}" ]]; then
                echo "Debian-Mismatch: erwartet ${EXPECTED_DEBIAN_MAJOR}, erhalten ${actual_debian_major}" >&2
                exit 1
              fi

              chmod +x runs/build_python_runtime_artifact.sh
              runs/build_python_runtime_artifact.sh "${TARGET_ARCH}" "${TARGET_OS_VARIANT}"
            '

      - name: Upload runtime artifact
        uses: actions/upload-artifact@v7
        with:
          name: python-runtime-${{ steps.pyver.outputs.version }}-${{ matrix.arch }}-debian${{ matrix.debian_version }}
          path: dist/python-runtime/python-${{ steps.pyver.outputs.version }}-linux-${{ matrix.arch }}-debian${{ matrix.debian_version }}.tar.xz*

  publish-release:
    needs:
      - build-runtime
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.publish_release }}
    runs-on: ubuntu-latest
    env:
      TARGET_RELEASE_OWNER: ${{ github.repository_owner }}
      TARGET_RELEASE_REPO: python-runtime
      TARGET_RELEASE_REPO_NAME: ${{ github.repository_owner }}/python-runtime
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Validate release token
        env:
          RELEASE_TOKEN: ${{ secrets.PYTHON_RUNTIME_REPO_TOKEN }}
        run: |
          if [[ -z "${RELEASE_TOKEN}" ]]; then
            echo "ERROR: Secret PYTHON_RUNTIME_REPO_TOKEN ist nicht gesetzt." >&2
            echo "Lege im Core-Repo ein Token mit mindestens 'Contents: Read and write' fuer ${TARGET_RELEASE_REPO_NAME} an." >&2
            exit 1
          fi

      - name: Read Python runtime version
        id: pyver
        run: |
          version=$(head -n 1 data/config/python_runtime_version.txt | tr -d '[:space:]')
          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "release_tag=python-runtime-${version}" >> "$GITHUB_OUTPUT"

      - name: Download runtime artifacts
        uses: actions/download-artifact@v8
        with:
          path: dist/python-runtime
          merge-multiple: true

      - name: Ensure python-runtime release exists
        uses: actions/github-script@v9
        with:
          github-token: ${{ secrets.PYTHON_RUNTIME_REPO_TOKEN }}
          script: |
            const owner = process.env.TARGET_RELEASE_OWNER;
            const repo = process.env.TARGET_RELEASE_REPO;
            const tag = '${{ steps.pyver.outputs.release_tag }}';
            const name = `${{ steps.pyver.outputs.version }} (${tag})`;
            const body = `Automatisch erzeugte Python-Runtime-Artefakte fuer openWB (${tag}).`;

            try {
              const release = (await github.rest.repos.getReleaseByTag({ owner, repo, tag })).data;
              await github.rest.repos.updateRelease({
                owner,
                repo,
                release_id: release.id,
                name,
                body,
                draft: false,
                prerelease: false
              });
            } catch (error) {
              if (error.status !== 404) throw error;
              await github.rest.repos.createRelease({
                owner,
                repo,
                tag_name: tag,
                name,
                body,
                draft: false,
                prerelease: false
              });
            }

      - name: Upload release assets
        uses: svenstaro/upload-release-action@v2
        with:
          repo_name: ${{ env.TARGET_RELEASE_REPO_NAME }}
          repo_token: ${{ secrets.PYTHON_RUNTIME_REPO_TOKEN }}
          tag: ${{ steps.pyver.outputs.release_tag }}
          file: dist/python-runtime/**/*
          file_glob: true
          overwrite: true
